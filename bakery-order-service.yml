
order:
  delivery:
    default-time-minutes: 60
    max-time-minutes: 180
  limits:
    max-items-per-order: 50
    max-order-value: 500.00
  tax:
    rate: 0.08
  discount:
    max-percentage: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,refresh
      base-path: /actuator
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.blubugtech.bakery_order_service: INFO
    org.springframework.web: INFO
    root: INFO

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.blubugtech.common.event.*"
  
kafka:
  topic:
    payment-events: payment-events
    order-events: order-events
    payment-requests: payment-requests

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    com.blubugtech.bakery_order_service: DEBUG
    org.springframework.web: DEBUG
