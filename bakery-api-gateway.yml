# Server Configuration
server:
  port: 8080

# Spring Application Configuration
spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              lower-case-service-id: true
              enabled: true
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                  - PATCH
                allowedHeaders: "*"
                allowCredentials: true
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
          routes:
            - id: auth-service
              uri: lb://bakery-auth-service
              predicates:
                - Path=/api/auth/**,/api/users/**
            - id: product-service
              uri: lb://bakery-product-service
              predicates:
                - Path=/api/categories/**,/api/products/**,/api/inventory/**,/api/uploads/**,/api/site-config/**
              filters:
                - AuthenticationFilter
            - id: order-service
              uri: lb://bakery-order-service
              predicates:
                - Path=/api/orders/**
              filters:
                - AuthenticationFilter
            - id: payment-service
              uri: lb://bakery-payment-service
              predicates:
                - Path=/api/payments/**,/api/refunds/**,/api/transactions/**
              filters:
                - AuthenticationFilter
            - id: cart-service
              uri: lb://bakery-cart-service
              predicates:
                - Path=/api/carts/**,/api/cart-items/**
              filters:
                - AuthenticationFilter
            - id: notification-service
              uri: lb://bakery-notification-service
              predicates:
                - Path=/api/notifications/**
              filters:
                - AuthenticationFilter
            - id: gateway-health
              uri: ${API_GATEWAY_URL:http://localhost:8080}
              predicates:
                - Path=/gateway/health
              filters:
                - RewritePath=/gateway/health,/actuator/health

# JWT Configuration
jwt:
  secret: bWVnYVN1cGVyU2VjcmV0S2V5Rm9yQmFrZXJ5QXV0aFNlcnZpY2UyMDI1

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Management & Actuator Configuration (CORRECTED)
management:
  info:
    env:
      enabled: true
    build:
      enabled: true
    git:
      mode: full
  endpoints:
    web:
      exposure:
        include: "*"  # Expose all endpoints
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    gateway:
      access: unrestricted
  # prometheus:
  #   metrics:
  #     export:
  #       enabled: true

# Logging Configuration
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.shah_s.bakery_api_gateway: DEBUG
    root: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

info:
  app:
    name: Bakery API Gateway
    description: Central gateway for bakery microservices
    version: 1.0.0
  build:
    version: '@project.version@'
    timestamp: '@timestamp@'



