
cart:
  limits:
    max-items-per-cart: 50
    max-quantity-per-item: 20
    max-total-value: 1000.00
  expiration:
    idle-timeout-minutes: 60
    abandoned-timeout-hours: 24
  validation:
    strict-inventory-check: false
  pricing:
    allow-zero-price: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,refresh
      base-path: /actuator
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.shah_s.bakery_cart_service: INFO
    org.springframework.web: INFO
    root: INFO

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    com.shah_s.bakery_cart_service: DEBUG
    org.springframework.web: DEBUG
