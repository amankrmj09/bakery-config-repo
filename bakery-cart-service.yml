# Server Configuration
server:
  port: 8086

# Spring Application Configuration
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  docker:
    compose:
      file: docker-compose-carts-db.yml
      enabled: false

  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 minutes
      cache-null-values: false

  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false
  data:
    redis:
      timeout: 60000
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s

# Eureka Client Configuration
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

# Feign Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic

# Management & Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, caches, refresh
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# Cart Service Specific Configuration
cart:
  expiration:
    guest-cart-hours: 24          # Guest carts expire after 24 hours
    user-cart-days: 30            # User carts expire after 30 days
    cleanup-interval-hours: 6     # Clean up expired carts every 6 hours
  limits:
    max-items-per-cart: 100       # Maximum items in a cart
    max-quantity-per-item: 50     # Maximum quantity for single item
    max-cart-value: 2000.00       # Maximum cart value
  cache:
    cart-ttl-minutes: 30          # Cart cache TTL
    product-info-ttl-minutes: 10  # Product info cache TTL
  validation:
    check-stock-on-add: true      # Check stock when adding items
    check-price-on-view: true     # Check prices when viewing cart
    auto-remove-unavailable: true # Remove unavailable items

# External Service URLs
external-services:
  product-service:
  order-service:

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://blubug.me:8005/bakery_carts
    username: cart_user
    password: cart_password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  data:
    redis:
      host: blubug.me
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    com.shah_s.bakery_cart_service: DEBUG
    org.springframework.web: DEBUG
    org.springframework.cache: DEBUG
    org.springframework.data.redis: DEBUG
    feign: DEBUG
    root: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/cart-service.log
    max-size: 10MB
    max-history: 30

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${CART_DB_URL}
    username: ${CART_DB_USER}
    password: ${CART_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT_CART}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}

logging:
  level:
    com.shah_s.bakery_cart_service: INFO
    org.springframework.web: INFO
    org.springframework.cache: INFO
    org.springframework.data.redis: INFO
    feign: INFO
    root: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/cart-service.log
    max-size: 10MB
    max-history: 30
