
notification:
  email:
    enabled: true
  retry:
    max-attempts: 3
    initial-interval: 1000
    max-interval: 10000
    multiplier: 2.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,refresh
      base-path: /actuator
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.blubugtech.bakery_notification_service: INFO
    org.springframework.mail: INFO
    root: INFO

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.blubugtech.*"
  
kafka:
  topic:
    payment-events: payment-events
    order-events: order-events
    user-events: user-events

brevo:
  templates:
    auth:
      welcome: ${TEMPLATE_AUTH_WELCOME:1}
      otp: ${TEMPLATE_AUTH_OTP:2}
      passwordChange: ${TEMPLATE_AUTH_PASSWORD_CHANGE:3}
      newSignIn: ${TEMPLATE_AUTH_NEW_SIGN_IN:4}
    order:
      confirmation: ${TEMPLATE_ORDER_CONFIRMATION:5}
      invoice: ${TEMPLATE_ORDER_INVOICE:6}
      delivery: ${TEMPLATE_ORDER_DELIVERY:7}
    payment:
      success: ${TEMPLATE_PAYMENT_SUCCESS:8}
      refund: ${TEMPLATE_PAYMENT_REFUND:9}
    feedback:
      general: ${TEMPLATE_FEEDBACK_GENERAL:10}
      review: ${TEMPLATE_FEEDBACK_REVIEW:11}

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    com.blubugtech.bakery_notification_service: DEBUG
    org.springframework.mail: DEBUG
