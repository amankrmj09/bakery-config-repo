
notification:
  email:
    enabled: true
  retry:
    max-attempts: 3
    initial-interval: 1000
    max-interval: 10000
    multiplier: 2.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,refresh
      base-path: /actuator
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.shah_s.bakery_notification_service: INFO
    org.springframework.mail: INFO
    root: INFO

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    com.shah_s.bakery_notification_service: DEBUG
    org.springframework.mail: DEBUG
