
notification:
  email:
    enabled: true
  retry:
    max-attempts: 3
    initial-interval: 1000
    max-interval: 10000
    multiplier: 2.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,refresh
      base-path: /actuator
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.shah_s.bakery_notification_service: INFO
    org.springframework.mail: INFO
    root: INFO

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "org.devofblue.common.event.*"

brevo:
  templates:
    transaction: ${BREVO_TEMPLATE_TRANSACTION:1}
    order: ${BREVO_TEMPLATE_ORDER:2}
    payment: ${BREVO_TEMPLATE_PAYMENT:3}
    welcome: ${BREVO_TEMPLATE_WELCOME:4}
    password-change: ${BREVO_TEMPLATE_PASSWORD_CHANGE:5}

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    com.shah_s.bakery_notification_service: DEBUG
    org.springframework.mail: DEBUG
