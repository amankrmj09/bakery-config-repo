# Server Configuration
server:
  port: 8083

# Spring Application Configuration
spring:

  # PostgreSQL Database Configuration
  datasource:
    url: ${PRODUCT_DB_URL:jdbc:postgresql://blubug.me:8002/bakery_products}
    username: ${PRODUCT_DB_USER:product_user}
    password: ${PRODUCT_DB_PASSWORD:product_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # Jackson Configuration
  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: product-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "org.devofblue.common.event"

  # Elasticsearch Configuration
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}

  docker:
    compose:
      file: docker-compose-products-db.yml
      enabled: false

  data:
    redis:
      host: ${REDIS_HOST:blubug.me}
      port: ${REDIS_PORT_PRODUCT:6380}
      timeout: 60000

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

# Management & Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, refresh
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  # prometheus:
  #   metrics:
  #     export:
  #       enabled: true

# Product Service Specific Configuration
product:
  inventory:
    low-stock-threshold: 10
    auto-disable-when-zero: true
  images:
    base-url: "https://bakery-images.s3.amazonaws.com/"
    default-image: "default-product.jpg"

aws:
  region: auto
  s3:
    bucket-name: bakery
    endpoint: ${AWS_S3_ENDPOINT:https://59ff51457eb45453daa57ffa1f4a20bd.r2.cloudflarestorage.com}
    public-url: ${AWS_S3_PUBLIC_URL:https://pub-49a69af59fc44431a21809176dd88bb8.r2.dev}
  credentials:
    access-key: ${AWS_ACCESS_KEY:ad4653738654f9f0e8baf193fd9af2a3}
    secret-key: ${AWS_SECRET_KEY:a64f372de305f1e9bc8f94c84209ee8098383f81bf333dbb21e7b534d554935b}

spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB

# Logging Configuration
logging:
  level:
    com.shah_s.bakery_product_service: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    root: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/product-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

