# Server Configuration
server:
  port: 8083

# Spring Application Configuration
spring:

  # PostgreSQL Database Configuration
  datasource:
    url: jdbc:postgresql://blubug.me:8002/bakery_products
    username: product_user
    password: product_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # Jackson Configuration
  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false

  docker:
    compose:
      file: docker-compose-products-db.yml
      enabled: false

  data:
    redis:
      host: blubug.me
      port: 6380
      timeout: 60000

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

# Management & Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, refresh
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  # prometheus:
  #   metrics:
  #     export:
  #       enabled: true

# Product Service Specific Configuration
product:
  inventory:
    low-stock-threshold: 10
    auto-disable-when-zero: true
  images:
    base-url: "https://bakery-images.s3.amazonaws.com/"
    default-image: "default-product.jpg"

aws:
  region: ${AWS_REGION:garage}
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:bakery}
    endpoint: ${AWS_S3_ENDPOINT:http://bakery-garagewithui-830bd1-165-232-179-17.sslip.io}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:GKb44846d4dc88ff710735f03b}
    secret-key: ${AWS_SECRET_ACCESS_KEY:d8f278170a6beb29bf1115ac841fa3e5c9aabc04bcd9c7fb4bca28112bc7424c}

spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB

# Logging Configuration
logging:
  level:
    com.shah_s.bakery_product_service: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    root: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/product-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

