# Server Configuration
server:
  port: 8082

# Spring Application Configuration
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false
  sql:
    init:
      schema-locations: classpath:init-scripts/01-init-auth-db.sql

  docker:
    compose:
      enabled: false

# Eureka Client Configuration
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    enabled: true
  instance:
    prefer-ip-address: true
    instance-id: "${spring.application.name}:${server.port}"
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

# JWT Configuration
jwt:
  expiration: 86400000  # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

# Management & Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,refresh
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: "${spring.application.name}"
  info:
    env:
      enabled: true
    build:
      enabled: true

info:
  app:
    name: Bakery Auth Service
    description: Authentication and user management service
    version: 1.0.0
  build:
    version: '@project.version@'
    timestamp: '@timestamp@'

# Security Configuration
security:
  password:
    strength: 10  # BCrypt strength
  login:
    max-attempts: 5
    lockout-duration: 300000  # 5 minutes in milliseconds

# App Configuration
app:
  admin:
    seed-enabled: true

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://blubug.me:8001/bakery_auth
    username: auth_user
    password: auth_password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  data:
    redis:
      host: blubug.me
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: bWVnYVN1cGVyU2VjcmV0S2V5Rm9yQmFrZXJ5QXV0aFNlcnZpY2UyMDI1

logging:
  level:
    com.shah_s.bakery_auth_service: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web: DEBUG
    root: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/auth-service.log

app:
  admin:
    first-name: Super
    last-name: Admin
    email: admin@bakery.com
    password: Admin@123
    phone: 1234567890

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${AUTH_DB_URL}
    username: ${AUTH_DB_USER}
    password: ${AUTH_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT_AUTH}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    com.shah_s.bakery_auth_service: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    org.springframework.web: INFO
    root: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/auth-service.log

app:
  admin:
    first-name: ${ADMIN_FIRST_NAME}
    last-name: ${ADMIN_LAST_NAME}
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
    phone: ${ADMIN_PHONE}
